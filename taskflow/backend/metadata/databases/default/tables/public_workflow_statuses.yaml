table:
  name: workflow_statuses
  schema: public
object_relationships:
  - name: user
    using:
      foreign_key_constraint_on: user_id
array_relationships:
  - name: tasks
    using:
      foreign_key_constraint_on:
        table:
          name: tasks
          schema: public
        column: workflow_status_id
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - user_id
        - slug
        - label
        - color
        - category
        - system
        - position
        - created_at
        - updated_at
      filter:
        user_id:
          _eq: X-Hasura-User-Id
insert_permissions:
  - role: user
    permission:
      check:
        user_id:
          _eq: X-Hasura-User-Id
      columns:
        - user_id
        - slug
        - label
        - color
        - category
        - system
        - position
update_permissions:
  - role: user
    permission:
      columns:
        - slug
        - label
        - color
        - category
        - system
        - position
        - updated_at
      filter:
        user_id:
          _eq: X-Hasura-User-Id
      check:
        user_id:
          _eq: X-Hasura-User-Id
delete_permissions:
  - role: user
    permission:
      filter:
        user_id:
          _eq: X-Hasura-User-Id
