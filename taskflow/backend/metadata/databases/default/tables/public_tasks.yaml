table:
  name: tasks
  schema: public
object_relationships:
  - name: workflow_status
    using:
      foreign_key_constraint_on: workflow_status_id
array_relationships:
  - name: task_tags
    using:
      foreign_key_constraint_on:
        table:
          name: task_tags
          schema: public
        column: task_id
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - user_id
        - title
        - description
        - workflow_status_id
        - priority
        - due_date
        - position
        - created_at
        - updated_at
      filter:
        user_id:
          _eq: X-Hasura-User-Id
insert_permissions:
  - role: user
    permission:
      check:
        user_id:
          _eq: X-Hasura-User-Id
      columns:
        - user_id
        - title
        - description
        - workflow_status_id
        - priority
        - due_date
        - position
update_permissions:
  - role: user
    permission:
      columns:
        - title
        - description
        - workflow_status_id
        - priority
        - due_date
        - position
        - updated_at
      filter:
        user_id:
          _eq: X-Hasura-User-Id
      check:
        user_id:
          _eq: X-Hasura-User-Id
delete_permissions:
  - role: user
    permission:
      filter:
        user_id:
          _eq: X-Hasura-User-Id
event_triggers:
  - name: tasks_created_start_temporal_reminder
    definition:
      enable_manual: false
      insert:
        columns: '*'
    retry_conf:
      interval_sec: 10
      num_retries: 3
      timeout_sec: 60
    webhook: http://host.docker.internal:4000/hasura/events/tasks-created
  - name: tasks_updated_send_moved_email
    definition:
      enable_manual: false
      update:
        columns:
          - workflow_status_id
    retry_conf:
      interval_sec: 10
      num_retries: 3
      timeout_sec: 60
    webhook: http://host.docker.internal:4000/hasura/events/tasks-updated
