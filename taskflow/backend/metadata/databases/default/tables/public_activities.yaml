table:
  name: activities
  schema: public
object_relationships:
  - name: user
    using:
      foreign_key_constraint_on: user_id
  - name: task
    using:
      foreign_key_constraint_on: task_id
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - user_id
        - task_id
        - message
        - created_at
      filter:
        user_id:
          _eq: X-Hasura-User-Id
insert_permissions:
  - role: user
    permission:
      check:
        user_id:
          _eq: X-Hasura-User-Id
      columns:
        - user_id
        - task_id
        - message
